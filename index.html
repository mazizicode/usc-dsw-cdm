<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USC DSW Course Design Map (CDM)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:linear-gradient(135deg,#faf5ee 0%,#fff 50%,#fef8f0 100%);color:#1a1a1a;min-height:100vh}
input,textarea,select,button{font-family:inherit}
input:focus,textarea:focus,select:focus{outline:none;box-shadow:0 0 0 2px #FFCC00}
.top-bar{height:4px;background:#990000}
.gold-bar-top{height:2px;background:#FFCC00}
.step-nav{display:flex;align-items:center;justify-content:center;gap:5px;padding:12px 8px;flex-wrap:wrap}
.step-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:20px;font-size:11px;font-weight:700;border:none;cursor:pointer;transition:all .2s}
.step-btn.active{background:#990000;color:#fff;box-shadow:0 2px 10px rgba(153,0,0,.3);transform:scale(1.05)}
.step-btn.done{background:#e8d5d5;color:#990000}
.step-btn.pending{background:#f0ece6;color:#999}
.card{background:#fff;border:1px solid #e8e0d0;border-radius:14px;padding:18px;margin-bottom:12px}
.card-accent{border:2px solid #990000}
.warm-bg{background:#FAF5EE}
.cream-bg{background:#FFF8E7}
.gold-left{border-left:3px solid #FFCC00;background:#fff8e7;padding:10px 14px;border-radius:0 8px 8px 0;margin:10px 0}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:2px}
.field label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#990000}
.field input,.field textarea,.field select{padding:8px 12px;border-radius:10px;border:1px solid #ddd;font-size:13px;background:#fff;transition:border .2s}
.field textarea{resize:vertical}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
@media(max-width:700px){.g2,.g3,.g4{grid-template-columns:1fr}}
.badge{display:inline-block;font-size:10px;font-weight:800;padding:2px 10px;border-radius:12px;color:#fff;background:#990000}
.badge-gold{background:#FFCC00;color:#1a1a1a}
.btn-p{background:#990000;color:#fff;border:none;padding:12px 28px;border-radius:12px;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(153,0,0,.25)}
.btn-p:hover{transform:scale(1.03)}
.btn-s{background:transparent;border:2px dashed #ccc;padding:10px;border-radius:12px;font-weight:700;font-size:12px;cursor:pointer;color:#999;width:100%}
.btn-s:hover{background:#fff;border-color:#990000;color:#990000}
.btn-o{background:transparent;border:1px solid #990000;color:#990000;padding:8px 18px;border-radius:10px;font-weight:700;font-size:12px;cursor:pointer}
.btn-o:hover{background:#990000;color:#fff}
.ces-card{border-radius:12px;transition:all .25s;border:2px solid #e0d8cc;background:#FAF5EE;margin-bottom:10px}
.ces-card.ck{border-color:#990000;background:#fff;box-shadow:0 2px 12px rgba(153,0,0,.08)}
.ces-inner{display:flex;align-items:flex-start;gap:12px;padding:14px}
.mod-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.mod-tab{padding:8px 16px;border-radius:10px;font-size:12px;font-weight:700;border:none;cursor:pointer;transition:all .2s}
.mod-tab.active{background:#990000;color:#fff;box-shadow:0 2px 8px rgba(153,0,0,.2)}
.mod-tab:not(.active){background:#f0ece6;color:#888}
.obj-row{border-radius:12px;padding:16px;border:1px solid #e8e0d0;margin-bottom:10px}
.obj-row:nth-child(odd){background:#FAF5EE}
.obj-row:nth-child(even){background:#fff}
.bot-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-top:1px solid #e0e0e0;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;z-index:100}
.prog-track{width:100%;height:10px;border-radius:8px;background:#eee;overflow:hidden}
.prog-fill{height:100%;border-radius:8px;transition:width .4s}
.bloom-card{border-radius:10px;padding:10px;border:1px solid #e0e0e0;background:#fff}
.bloom-card.pri{border-color:#FFCC00;background:#fff8e7}
.stitle{font-size:22px;font-weight:900;color:#990000;margin-bottom:4px}
.ssub{font-size:11px;color:#999;margin-bottom:16px}
.content{padding-bottom:80px;max-width:900px;margin:0 auto;padding-left:16px;padding-right:16px}
.bullet-item{display:flex;align-items:flex-start;gap:8px;padding:4px 0;font-size:13px;color:#444;line-height:1.5}
.bullet-dot{color:#990000;font-weight:900;font-size:16px;line-height:1.3}
.how-item{margin-bottom:12px}
.how-label{font-weight:700;color:#990000;font-size:13px}
.how-desc{font-size:12px;color:#555;line-height:1.5;margin-top:2px}
.tip-item{display:flex;align-items:flex-start;gap:8px;padding:4px 0}
.tip-arrow{color:#FFCC00;font-size:14px}
.tip-text{font-size:12px;color:#666;font-style:italic;line-height:1.5}
.msw-card{border-radius:10px;padding:10px;border:1px solid #ddd;background:#fff;transition:all .2s;cursor:pointer}
.msw-card.ck{border-color:#990000;background:#fef3f3}
.msw-card .comp-name{font-size:10px;font-weight:700;color:#990000;margin-top:4px}
.msw-card .comp-desc{font-size:9px;color:#777;margin-top:2px;line-height:1.3}

/* Accessibility & sizing - 25% larger */
body{font-size:17px;line-height:1.6}
.field input,.field textarea,.field select{font-size:16px;padding:12px 16px;border-radius:12px}
.field label{font-size:13px;letter-spacing:.6px}
.field{margin-bottom:4px}
.stitle{font-size:30px;margin-bottom:8px}
.ssub{font-size:15px;margin-bottom:20px}
.badge{font-size:13px;padding:4px 14px;border-radius:14px}
.btn-p{padding:16px 36px;font-size:16px;border-radius:14px}
.btn-s{font-size:15px;padding:14px;border-radius:14px}
.btn-o{font-size:15px;padding:12px 24px;border-radius:12px}
.step-btn{font-size:13px;padding:10px 16px;border-radius:24px}
.card{padding:24px;border-radius:16px}
.bullet-item{font-size:16px;padding:6px 0}
.bullet-dot{font-size:20px}
.how-item{margin-bottom:16px}
.how-label{font-size:16px}
.how-desc{font-size:15px;line-height:1.6}
.tip-text{font-size:15px}
.tip-item{padding:6px 0}
.ces-card{border-radius:14px}
.ces-inner{padding:18px}
.ces-inner p{font-size:15px}
.msw-card{border-radius:12px;padding:14px}
.msw-card .comp-name{font-size:13px;margin-top:6px}
.msw-card .comp-desc{font-size:12px;margin-top:4px;line-height:1.4}
.obj-row{padding:22px;border-radius:14px}
.gold-left{padding:16px 20px;font-size:15px;border-radius:0 12px 12px 0}
.content{max-width:1060px;padding-left:24px;padding-right:24px}
.g2{gap:16px}.g3{gap:16px}.g4{gap:16px}
.mod-tabs{gap:10px}
.mod-tab{font-size:14px;padding:12px 22px;border-radius:12px}
.bot-nav{padding:14px 24px}
.step-nav{padding:14px 12px;gap:6px}
.card-accent{border-radius:16px}

/* Admin Dashboard styles */
.admin-badge{display:inline-block;font-size:11px;font-weight:700;color:#990000;background:#fef2f2;padding:2px 10px;border-radius:10px}

/* Version & Comments styles */
.ver-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 10px;border-radius:10px;background:#990000;color:#fff}
.ver-badge.locked{background:#888}
.comment-bubble{background:#fff;border:1px solid #e8e0d0;border-radius:12px;padding:14px;margin-bottom:10px}
.comment-meta{font-size:12px;color:#888;margin-bottom:6px}
.comment-role{font-size:10px;font-weight:700;padding:1px 8px;border-radius:8px;display:inline-block;margin-left:6px}
.comment-role.admin{background:#fef2f2;color:#990000}
.comment-role.faculty{background:#f0fdf4;color:#166534}
.comment-text{font-size:14px;color:#333;line-height:1.5}
.comment-section{font-size:11px;color:#990000;font-weight:600;margin-bottom:4px}
.ver-timeline{display:flex;flex-direction:column;gap:8px}
.ver-card{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;border:1px solid #e8e0d0;border-radius:12px;cursor:pointer;transition:all .2s}
.ver-card:hover{border-color:#990000;box-shadow:0 2px 8px rgba(153,0,0,.1)}
.ver-card.current{border:2px solid #990000;background:#fef8f0}
</style>
</head>

function loadAllFaculty(cb){
  firebase.firestore().collection("cdm_data").get().then(function(snap){
    var faculty=[];
    var promises=[];
    snap.forEach(function(userDoc){
      var uid=userDoc.id;
      promises.push(
        firebase.firestore().collection("cdm_data").doc(uid).collection("courses").orderBy("lastUpdated","desc").get().then(function(coursesSnap){
          var courses=[];
          coursesSnap.forEach(function(cDoc){
            var d=cDoc.data();
            courses.push({id:cDoc.id,name:d.courseName||"Untitled",leadName:d.leadName||"",lastUpdated:d.lastUpdated,userEmail:d.userEmail||"",userName:d.userName||""});
          });
          if(courses.length>0){
            faculty.push({uid:uid,email:courses[0].userEmail,name:courses[0].userName,courses:courses});
          }
        })
      );
    });
    Promise.all(promises).then(function(){
      faculty.sort(function(a,b){return(a.name||"").localeCompare(b.name||"");});
      cb(faculty);
    });
  }).catch(function(e){console.error("Admin load error:",e);cb([]);});
}

function loadFacultyCourse(uid,cid,cb){
  firebase.firestore().collection("cdm_data").doc(uid).collection("courses").doc(cid).get().then(function(doc){
    if(doc.exists){var d=doc.data().cdmData;if(d){try{var p=JSON.parse(d);if(!p.cesExplain)p.cesExplain={};cb(p);}catch(e){cb(null);}}else cb(null);}
    else cb(null);
  }).catch(function(){cb(null);});
}

function load(){return INIT;}
function loadCourseList(uid,cb){firebase.firestore().collection("cdm_data").doc(uid).collection("courses").get().then(function(s){var r=[];s.forEach(function(d){var x=d.data();r.push({id:d.id,name:x.courseName||"Untitled",lastUpdated:x.lastUpdated,leadName:x.leadName||""});});cb(r);}).catch(function(){cb([]);});}
function loadCourse(uid,cid,cb){firebase.firestore().collection("cdm_data").doc(uid).collection("courses").doc(cid).get().then(function(d){if(d.exists){var x=d.data().cdmData;if(x){try{var p=JSON.parse(x);if(!p.cesExplain)p.cesExplain={};if(!p.cdmVersion)p.cdmVersion="1.0";if(!p.cdmVersionNote)p.cdmVersionNote="Initial version";cb(p);}catch(e){console.error("Parse error:",e);cb(INIT);}}else cb(INIT);}else cb(INIT);}).catch(function(e){console.error("Load course error:",e);cb(INIT);});}
function createNewCourse(uid,cb){var r=firebase.firestore().collection("cdm_data").doc(uid).collection("courses").doc();r.set({cdmData:JSON.stringify(INIT),courseName:"New Course",leadName:"",cdmVersion:"1.0",lastUpdated:firebase.firestore.FieldValue.serverTimestamp()}).then(function(){cb(r.id);}).catch(function(e){console.error("Create course error:",e);alert("Error creating course. Please check that Firestore rules are updated. Error: "+e.message);});}
function deleteCourse(uid,cid,cb){firebase.firestore().collection("cdm_data").doc(uid).collection("courses").doc(cid).delete().then(cb);}

function loadComments(uid,cid,cb){
  firebase.firestore().collection("cdm_data").doc(uid).collection("courses").doc(cid).collection("comments").orderBy("timestamp","desc").get().then(function(snap){
    var comments=[];
    snap.forEach(function(d){comments.push(Object.assign({id:d.id},d.data()));});
    cb(comments);
  }).catch(function(){cb([]);});
}

function addComment(uid,cid,commentData,cb){
  firebase.firestore().collection("cdm_data").doc(uid).collection("courses").doc(cid).collection("comments").add(
    Object.assign(commentData,{timestamp:firebase.firestore.FieldValue.serverTimestamp()})
  ).then(function(){cb();}).catch(function(e){console.error("Comment error:",e);});
}

function loadVersionHistory(uid,cid,cb){
  firebase.firestore().collection("cdm_data").doc(uid).collection("courses").doc(cid).collection("versions").orderBy("versionNumber","desc").get().then(function(snap){
    var versions=[];
    snap.forEach(function(d){versions.push(Object.assign({id:d.id},d.data()));});
    cb(versions);
  }).catch(function(){cb([]);});
}

function createVersion(uid,cid,currentData,versionNote,cb){
  var vNum=parseFloat(currentData.cdmVersion||"1.0");
  var newVNum=(vNum+1.0).toFixed(1);
  var versionsRef=firebase.firestore().collection("cdm_data").doc(uid).collection("courses").doc(cid).collection("versions");
  versionsRef.add({
    versionNumber:vNum,
    versionNote:currentData.cdmVersionNote||"",
    cdmData:JSON.stringify(currentData),
    createdAt:firebase.firestore.FieldValue.serverTimestamp(),
    createdBy:firebase.auth().currentUser?firebase.auth().currentUser.displayName:"Unknown"
  }).then(function(){
    var updated=Object.assign({},currentData);
    updated.cdmVersion=newVNum;
    updated.cdmVersionNote=versionNote||"Updated version";
    updated.cdmCreated=new Date().toISOString();
    cb(updated,newVNum);
  }).catch(function(e){console.error("Version error:",e);});
}

function loadVersionData(uid,cid,versionId,cb){
  firebase.firestore().collection("cdm_data").doc(uid).collection("courses").doc(cid).collection("versions").doc(versionId).get().then(function(doc){
    if(doc.exists){
      var d=doc.data();
      try{cb(JSON.parse(d.cdmData),d);}catch(e){cb(null,d);}
    }else cb(null,null);
  }).catch(function(){cb(null,null);});
}

function save(d,cid){var u=firebase.auth().currentUser;if(!u||!cid)return;firebase.firestore().collection("cdm_data").doc(u.uid).collection("courses").doc(cid).set({cdmData:JSON.stringify(d),courseName:d.courseName||"Untitled",cdmVersion:d.cdmVersion||"1.0",leadName:d.courseLead||"",userEmail:u.email,userName:u.displayName,lastUpdated:firebase.firestore.FieldValue.serverTimestamp()}).catch(function(e){console.error("Save:",e);});}
